{{ define "main" }}
<section class="section">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-lg-10">
        <div class="mb-5 text-center">
          <span class="text-primary text-uppercase letter-spacing">{{ .Params.subtitle | default "Site search" }}</span>
          <h1 class="mt-3">{{ .Title }}</h1>
          {{ with .Params.description }}
            <p class="mt-3">{{ . }}</p>
          {{ end }}
        </div>

        <div class="search-shell">
          <div id="search" data-pagefind-ignore></div>
          <noscript>
            <p>Search requires JavaScript.</p>
          </noscript>
        </div>
      </div>
    </div>
  </div>
</section>
{{ end }}
