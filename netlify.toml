[build]
publish = "public"
command = "npm run build"

[build.environment]
HUGO_VERSION = "0.154.5"
GO_VERSION = "1.26.1"
NODE_VERSION = "24.14.0"
HUGO_ENV = "production"
HUGO_ENABLEGITINFO = "true"

[context.deploy-preview.environment]
HUGO_ENV = "production"

[context.branch-deploy.environment]
HUGO_ENV = "production"
